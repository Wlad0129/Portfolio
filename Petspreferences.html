<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto de Conceptos HTML/CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="contenedor-principal">
        
        <!-- Tarjeta Thor -->
        <article class="tarjeta">
            <div class="foto-perfil">
                <img class="image" src="Thor.jpg" alt="Thor">
            </div>
            <header class="tarjeta-header">
                <h1>Thor</h1>
                <p class="subtitulo">Cane Corso</p>
            </header>
            <section class="tarjeta-cuerpo">
                <div class="habilidades">
                    <span class="tag">Fuerte</span>
                    <span class="tag">Educado</span>
                    <span class="tag">Protector</span>
                </div>
            </section>
        </article>

        <!-- Tarjeta Hercules -->
        <article class="tarjeta">
            <div class="foto-perfil">
                <img class="image" src="labra.jpg" alt="Hercules">
            </div>
            <header class="tarjeta-header">
                <h1>Hercules</h1>
                <p class="subtitulo">Labrador</p>
            </header>
            <section class="tarjeta-cuerpo">
                <div class="habilidades">
                    <span class="tag">Cuidador</span>
                    <span class="tag">Rastreador</span>
                    <span class="tag">Jugueton</span>
                </div>
            </section>
        </article>

        <!-- Tarjeta Apolo -->
        <article class="tarjeta">
            <div class="foto-perfil">
                <img class="image" src="pitbull.jpeg" alt="Apolo">
            </div>
            <header class="tarjeta-header">
                <h1>Apolo</h1>
                <p class="subtitulo">Pitbull American Bully</p>
            </header>
            <section class="tarjeta-cuerpo">
                <div class="habilidades">
                    <span class="tag">Musculoso</span>
                    <span class="tag">Cariñoso</span>
                    <span class="tag">Jugueton</span>
                </div>
            </section>
        </article>


    </main>
    <div class="contenedor-inferior">
        <button class="btn-return" onclick="window.location.href='portfolio.html'">Return</button>
    </div>

</body>
</html>
